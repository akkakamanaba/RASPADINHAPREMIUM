<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store - Raspadinha</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#2b0050,#0d001a);
  color:white;
  text-align:center;
}
h1{ margin-top:30px; }
#login,#game{ margin-top:30px; }

input{
  padding:10px;
  border-radius:5px;
  border:none;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  background:#7b00ff;
  color:white;
  cursor:pointer;
}

.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:15px;
  justify-content:center;
}

.card{
  position:relative;
  width:100px;
  height:100px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.card.locked{
  background:#2a2a2a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#ff4dff;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  touch-action:none;
}
</style>
</head>
<body>

<h1>DEATH STORE RASPADINHA</h1>

<div id="login">
<input id="keyInput" placeholder="Digite sua key">
<button onclick="checkKey()">Entrar</button>
<p id="msg"></p>
</div>

<div id="game" style="display:none;">
<p>Raspe apenas 3 quadrados</p>
<div class="grid" id="grid"></div>
<p id="result"></p>
</div>

<script>

// 🔑 15 KEYS
const keys=[
"DS-A1B2","DS-C3D4","DS-E5F6",
"DS-G7H8","DS-I9J0","DS-K1L2",
"DS-M3N4","DS-O5P6","DS-Q7R8",
"DS-S9T0","DS-U1V2","DS-W3X4",
"DS-Y5Z6","DS-AB7C","DS-DE8F"
];

let scratches=0;
let total=0;
let currentKey=null;

function checkKey(){
  const k=document.getElementById("keyInput").value.trim();

  if(!keys.includes(k)){
    document.getElementById("msg").innerText="Key inválida";
    return;
  }

  if(localStorage.getItem("used_"+k)){
    document.getElementById("msg").innerText="Essa key já foi usada nesse navegador!";
    return;
  }

  currentKey=k;

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";
  startGame();
}

function startGame(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  scratches=0;
  total=0;
  document.getElementById("result").innerText="";

  let premios=[];

  // 5 valores baixos (360K–520K)
  for(let i=0;i<5;i++){
    let valor=Math.floor(Math.random()*161)+360;
    premios.push({valor:valor, tipo:"baixo"});
  }

  // 4 valores altos fixos
  const altos=[5000,12000,25000,45000];

  altos.forEach(v=>{
    premios.push({valor:v, tipo:"alto"});
  });

  premios=premios.sort(()=>0.5-Math.random());

  premios.forEach(p=>{
    if(p.tipo==="baixo"){
      createScratchCard(p.valor);
    }else{
      createLockedCard(p.valor);
    }
  });
}

function createScratchCard(value){

  const card=document.createElement("div");
  card.className="card";

  const text=document.createElement("div");
  text.style.position="absolute";
  text.style.width="100%";
  text.style.height="100%";
  text.style.display="flex";
  text.style.alignItems="center";
  text.style.justifyContent="center";
  text.innerHTML=value+"K 💎";

  const canvas=document.createElement("canvas");
  canvas.width=100;
  canvas.height=100;

  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#999";
  ctx.fillRect(0,0,100,100);
  ctx.globalCompositeOperation="destination-out";

  let revealed=false;
  let holding=false;

  function scratch(e){
    if(!holding || revealed || scratches>=3) return;
    e.preventDefault();

    const rect=canvas.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

    ctx.beginPath();
    ctx.arc(x,y,15,0,Math.PI*2);
    ctx.fill();

    const pixels=ctx.getImageData(0,0,100,100).data;
    let count=0;
    for(let i=3;i<pixels.length;i+=50){
      if(pixels[i]===0) count++;
    }

    if(count>150){
      revealed=true;
      canvas.remove();
      scratches++;
      total+=value;

      if(scratches===3){
        finishGame();
      }
    }
  }

  canvas.addEventListener("mousedown",()=>holding=true);
  canvas.addEventListener("mouseup",()=>holding=false);
  canvas.addEventListener("mousemove",scratch);
  canvas.addEventListener("touchstart",()=>holding=true);
  canvas.addEventListener("touchend",()=>holding=false);
  canvas.addEventListener("touchmove",scratch);

  card.appendChild(text);
  card.appendChild(canvas);
  document.getElementById("grid").appendChild(card);
}

function createLockedCard(value){
  const card=document.createElement("div");
  card.className="card locked";
  card.innerHTML=(value/1000)+"M 💎";
  document.getElementById("grid").appendChild(card);
}

function finishGame(){

  // 🔒 marca key como usada
  localStorage.setItem("used_"+currentKey,"true");

  if(total>=1000){
    document.getElementById("result").innerText=
    "Você ganhou "+(total/1000).toFixed(2)+"M gemas";
  }else{
    document.getElementById("result").innerText=
    "Você ganhou "+total+"K gemas";
  }

  document.querySelectorAll("canvas").forEach(c=>c.remove());
}

</script>

</body>
</html>
