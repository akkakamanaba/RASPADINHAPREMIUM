<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Death Store Raspadinha</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#1b0033,#060010);
color:white;
text-align:center;
}

h1{
margin-top:30px;
font-size:36px;
letter-spacing:3px;
color:#f2ccff;
text-shadow:0 0 20px #a200ff;
}

input{
padding:12px;
border:none;
border-radius:8px;
width:200px;
margin-top:10px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#8a00ff;
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 10px #8a00ff;
}

.grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,110px);
gap:18px;
justify-content:center;
}

.card{
position:relative;
width:110px;
height:110px;
background:#140024;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 15px #7a00ff;
}

.value{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:bold;
}

canvas{
position:absolute;
top:0;
left:0;
}

#result{
margin-top:30px;
font-size:24px;
background:#140022;
padding:20px;
border-radius:12px;
width:260px;
margin-left:auto;
margin-right:auto;
box-shadow:0 0 20px #8a00ff;
animation:pop 0.5s ease;
}

@keyframes pop{
0%{transform:scale(0.6);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

</style>
</head>
<body>

<h1>DEATH STORE</h1>

<div id="login">

<p>Digite sua Key</p>

<input id="keyInput" placeholder="DS-XXXX">
<button onclick="checkKey()">ENTRAR</button>

<p id="msg"></p>

</div>

<div id="game" style="display:none;">

<p>Raspe apenas 1 quadrado</p>

<div class="grid" id="grid"></div>

<p id="result"></p>

</div>

<script>

const keys={

"DS-A1K9":"1.1M 💎",
"DS-B3L2":"1.2M 💎",
"DS-C7P4":"1.3M 💎",
"DS-D8T6":"1.4M 💎",
"DS-E2X5":"1.5M 💎",

"DS-F4Q1":"1.2M 💎",
"DS-G6M3":"1.1M 💎",
"DS-H9Z7":"1.4M 💎",
"DS-J2K8":"1.3M 💎",
"DS-K5R6":"1.5M 💎",

"DS-L1V4":"1.2M 💎",
"DS-M7S9":"1.3M 💎",
"DS-N8F2":"1.4M 💎",
"DS-P3H5":"1.1M 💎",
"DS-Q4Y7":"1.5M 💎",

"DS-R9C1":"1.2M 💎",
"DS-S6D8":"1.3M 💎",
"DS-T5B4":"1.4M 💎",
"DS-U2E7":"1.1M 💎",

"DS-ULTRA40":"40M 💎"

};

const fakeHigh=["17M 💎","33M 💎","50M 💎"];

const fakeLow=[
"1.1M 💎",
"1.2M 💎",
"1.3M 💎",
"1.4M 💎",
"1.5M 💎"
];

let currentKey=null;
let scratched=false;
let valores=[];

function checkKey(){

const k=document.getElementById("keyInput").value.trim();

if(!keys[k]){
document.getElementById("msg").innerText="Key inválida";
return;
}

if(localStorage.getItem("used_"+k)){
document.getElementById("msg").innerText="Essa key já foi usada!";
return;
}

currentKey=k;

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

startGame();

}

function startGame(){

const grid=document.getElementById("grid");

grid.innerHTML="";
scratched=false;

const premioReal=keys[currentKey];

let lista=[];

lista.push(...fakeHigh);
lista.push(...fakeLow);
lista.push(premioReal);

lista=lista.sort(()=>Math.random()-0.5);

valores=lista;

for(let i=0;i<9;i++){
createCard(i);
}

}

function moverValorAlto(index){

const premioReal=keys[currentKey];

if(fakeHigh.includes(valores[index])){

const valorAlto=valores[index];

valores[index]=premioReal;

let novo;

do{
novo=Math.floor(Math.random()*valores.length);
}while(novo===index);

valores[novo]=valorAlto;

document.querySelectorAll(".value").forEach((v,i)=>{
v.innerHTML=valores[i];
});

}

}

function createCard(index){

const card=document.createElement("div");
card.className="card";

const valueDiv=document.createElement("div");
valueDiv.className="value";
valueDiv.innerHTML=valores[index];

const canvas=document.createElement("canvas");

canvas.width=110;
canvas.height=110;

const ctx=canvas.getContext("2d");

ctx.fillStyle="#bbbbbb";
ctx.fillRect(0,0,110,110);

ctx.globalCompositeOperation="destination-out";

let holding=false;

function scratch(e){

if(!holding || scratched) return;

e.preventDefault();

const rect=canvas.getBoundingClientRect();

const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

ctx.beginPath();
ctx.arc(x,y,18,0,Math.PI*2);
ctx.fill();

const pixels=ctx.getImageData(0,0,110,110).data;

let count=0;

for(let i=3;i<pixels.length;i+=40){
if(pixels[i]===0) count++;
}

if(count>180){

scratched=true;

moverValorAlto(index);

finishGame();

}

}

canvas.addEventListener("mousedown",()=>holding=true);
canvas.addEventListener("mouseup",()=>holding=false);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>holding=true,{passive:false});
canvas.addEventListener("touchend",()=>holding=false);
canvas.addEventListener("touchmove",scratch,{passive:false});

card.appendChild(valueDiv);
card.appendChild(canvas);

document.getElementById("grid").appendChild(card);

}

function finishGame(){

localStorage.setItem("used_"+currentKey,"true");

document.querySelectorAll("canvas").forEach(c=>{
c.remove();
});

const premio=keys[currentKey];

document.getElementById("result").innerHTML=
"🎉 PARABÉNS!<br><br>VOCÊ GANHOU:<br><span style='font-size:32px;color:#00ffd5;'>"+premio+"</span>";

}

</script>

</body>
</html>
